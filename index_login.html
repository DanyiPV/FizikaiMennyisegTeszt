<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style_login.css">
    <script defer src="script.js"></script>
    <title>Bejelentkezés - CKIK</title>
</head>
<body>
    <div class="AnswearDiv" id="AnswearDiv">
        <div class="AnsQuestionMark">
            <img src="ph/question.png" alt="question_mark.png">
        </div>
        <p id="QuestionAnsP"></p>
    </div>
    <div class="FaultDiv" id="FaultDiv">

    </div>
    <div class="Container HeightChange" id="Container">
        <div class="LogRegistDiv">
            <div class="LogInDiv">
                <button onclick="LogRegSwitch('B')">Bejelentkezés</button>
            </div>
            <div class="RegistDiv">
                <button onclick="LogRegSwitch('R')">Regisztrálás</button>
            </div>
            <div class="UnderLine" id="UnderLine"></div>
        </div>
        <div class="Tabs">
            <div id="LoginTab">
                <div class="QuestionDiv" id="QuestionDiv">
                    <img src="ph/question.png" alt="question_mark.png" id="QuestionMark" onclick="QuestionMark('Jelentkezzen be az email címével, ha nincs, regisztráljon egyet!')">
                </div>
                <div class="UsernameDiv">
                    <label for="Input1" id="label1" onclick="LabelFeltol(1)" onchange="ValueCheck(1)">Email</label>
                    <input type="text" name="Input1" id="Input1" onclick="LabelFeltol(1)" onchange="ValueCheck(1)" tabindex="-1">
                </div>
                <div class="PasswordDiv">
                    <label for="Input2" id="label2" onclick="LabelFeltol(2)" onchange="ValueCheck(2)">Jelszó</label>
                    <input type="password" name="Input2" id="Input2" onclick="LabelFeltol(2)" onchange="ValueCheck(2)" tabindex="-1">
                </div>
                <div class="PasswordShowDiv">
                    <label for="PasswordShow1" onchange="PasswordShow('Login')">Jelszó megjelenítése</label>
                    <input type="checkbox" name="PasswordShow1" id="PasswordShow1" onchange="PasswordShow('Login')" tabindex="-1">
                </div>
                <div class="LogInButton">
                    <button onclick="Bejelentkezes()">Bejelentkezés</button>
                </div>
            </div>
            <div id="RegisterTab">
                <div class="UsernameDiv">
                    <label for="Input3" id="label3" onclick="LabelFeltol(3)" onchange="ValueCheck(3)">Felhasználónév</label>
                    <input type="text" name="Input3" id="Input3" onclick="LabelFeltol(3)" onchange="ValueCheck(3)" tabindex="-1">
                </div>
                <div class="UsernameDiv">
                    <label for="Input4" id="label4" onclick="LabelFeltol(4)" onchange="ValueCheck(4)">Email</label>
                    <input type="text" name="Input4" id="Input4" onclick="LabelFeltol(4)" onchange="ValueCheck(4)" tabindex="-1">
                </div>
                <div class="RadioButtons">
                    <div id="DiakDiv">
                        <label for="DiakRadioButton">Diák</label>
                        <input type="radio" name="RadioButton" id="DiakRadioButton" onchange="TanarCheck()" checked>
                    </div>
                    <div id="TanarDiv">
                        <label for="TanarRadioButton">Tanár</label>
                        <input type="radio" name="RadioButton" id="TanarRadioButton" onchange="TanarCheck()">
                    </div>
                </div>
                <div id="TanarKod">
                    <label for="TanarKodCheck" id="TanarKodCheckLabel">Megerősítő kód:</label>
                    <input type="text" name="TanarKodCheck" id="TanarKodCheck" maxlength="8">
                </div>
                <div id="OsztalySelect">
                    <div id="Evfolyam">
                        <label for="DiakEvfolyam" id="EvfolyamKivalaszt">Évfolyam: </label>
                        <select name="DiakEvfolyam" id="DiakEvfolyam">
                            <option value="9">9</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                            <option value="13">13</option>
                        </select>
                    </div>
                    <div id="Osztaly">
                        <label for="DiakOsztaly" id="OsztalyKivalaszt">Osztály: </label>
                        <select name="DiakOsztaly" id="DiakOsztaly">
                            <option value="A">A</option>
                            <option value="B">B</option>
                            <option value="C">C</option>
                            <option value="K">K</option>
                        </select>
                    </div>
                </div>
                <div class="PasswordDiv">
                    <label for="Input5" id="label5" onclick="LabelFeltol(5)" onchange="ValueCheck(5)">Jelszó</label>
                    <input type="password" name="Input5" id="Input5" onclick="LabelFeltol(5)" onchange="ValueCheck(5)" tabindex="-1">
                </div>
                <div class="PasswordDiv">
                    <label for="Input6" id="label6" onclick="LabelFeltol(6)" onchange="ValueCheck(6)">Jelszó megerősítés</label>
                    <input type="password" name="Input6" id="Input6" onclick="LabelFeltol(6)" onchange="ValueCheck(6)">
                </div>
                <div class="PasswordShowDiv">
                    <label for="PasswordShow2" onchange="PasswordShow('Reg')">Jelszó megjelenítése</label>
                    <input type="checkbox" name="PasswordShow2" id="PasswordShow2" onchange="PasswordShow('Reg')">
                </div>
                <div class="LogInButton">
                    <button onclick="Regisztralas()">Regisztrálás</button>
                </div>
            </div>
        </div>
    </div>
</body>
<script src="adatbazis.js"></script>
</html>
